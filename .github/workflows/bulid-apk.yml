name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android packages
        shell: bash
        run: |
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"
          yes | sdkmanager --licenses >/dev/null 2>&1 || true

      - name: Create local.properties
        shell: bash
        run: |
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties

      - name: Create .env
        shell: bash
        run: |
          if [ -n "${{ secrets.GEMINI_API_KEY }}" ]; then
            printf "GEMINI_API_KEY=%s\n" "${{ secrets.GEMINI_API_KEY }}" > .env
          else
            printf "GEMINI_API_KEY=DUMMY_KEY_FOR_CI\n" > .env
          fi

      - name: Create debug keystore
        shell: bash
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000

      - name: Download Gradle 9.3.1
        shell: bash
        run: |
          curl -fsSL https://services.gradle.org/distributions/gradle-9.3.1-bin.zip -o gradle.zip
          unzip -q gradle.zip -d "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/gradle-9.3.1/bin" >> "$GITHUB_PATH"

      - name: Build debug APK
        shell: bash
        run: |
          gradle -p . :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TakeshiCoin-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
