name: Build Update APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android packages
        shell: bash
        run: |
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"
          yes | sdkmanager --licenses >/dev/null 2>&1 || true

      - name: Restore persistent debug keystore
        shell: bash
        run: |
          mkdir -p ~/.android
          if [ -n "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > ~/.android/debug.keystore
          else
            echo "Missing secret DEBUG_KEYSTORE_BASE64"
            exit 1
          fi

      - name: Create local.properties
        shell: bash
        run: |
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties

      - name: Bump version for this build
        shell: bash
        run: |
          VERSION_CODE="${GITHUB_RUN_NUMBER}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION_NAME="${GITHUB_REF_NAME#v}"
          else
            VERSION_NAME="dev-${GITHUB_RUN_NUMBER}"
          fi

          python3 - <<'PY'
          import os, re
          from pathlib import Path

          path = Path("app/build.gradle.kts")
          text = path.read_text()

          version_code = os.environ["VERSION_CODE"]
          version_name = os.environ["VERSION_NAME"]

          text_new = re.sub(r'versionCode\s*=\s*\d+', f'versionCode = {version_code}', text)
          text_new = re.sub(r'versionName\s*=\s*".*?"', f'versionName = "{version_name}"', text_new)

          if text_new == text:
              raise SystemExit("Could not find versionCode/versionName in app/build.gradle.kts")

          path.write_text(text_new)
          print(f"Updated to versionCode={version_code}, versionName={version_name}")
          PY
        env:
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: ${{ github.ref_name }}

      - name: Make gradlew executable
        shell: bash
        run: chmod +x ./gradlew

      - name: Build debug APK
        shell: bash
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        shell: bash
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/*.apk "dist/TakeshiCoin-${GITHUB_REF_NAME:-dev}-${GITHUB_RUN_NUMBER}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: update-apk
          path: dist/*.apk
          if-no-files-found: error
